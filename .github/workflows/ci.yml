name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── TypeScript + Lint ─────────────────────────────────────────────────────
  web:
    name: Next.js type-check + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx turbo run type-check

      - name: Lint
        run: npx turbo run lint

  # ─── Python AI Service ─────────────────────────────────────────────────────
  ai-service:
    name: FastAPI lint + unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ai-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: apps/ai-service/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt ruff pytest pytest-asyncio

      - name: Ruff lint
        run: ruff check .

      - name: Unit tests (no LLM calls)
        run: pytest tests/unit/ -v --timeout=30
        env:
          ANTHROPIC_API_KEY: "sk-ant-test"
          SUPABASE_URL: "https://test.supabase.co"
          SUPABASE_SERVICE_ROLE_KEY: "test"
          NEO4J_URI: "neo4j://localhost:7687"
          NEO4J_PASSWORD: "test"
          QDRANT_URL: "http://localhost:6333"
          QDRANT_API_KEY: "test"

  # ─── AI Evals (only on PRs touching ai-service/) ───────────────────────────
  ai-evals:
    name: DeepEval + RAGAS quality gates
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' &&
      contains(github.event.pull_request.changed_files, 'apps/ai-service/')
    defaults:
      run:
        working-directory: apps/ai-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: apps/ai-service/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt deepeval ragas datasets

      - name: Run eval suite
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          QDRANT_URL:          ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY:      ${{ secrets.QDRANT_API_KEY }}
          NEO4J_URI:           ${{ secrets.NEO4J_URI }}
          NEO4J_USER:          ${{ secrets.NEO4J_USER }}
          NEO4J_PASSWORD:      ${{ secrets.NEO4J_PASSWORD }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
        run: |
          python -m pytest tests/evals/ -v --timeout=120 \
            -k "faithfulness or hallucination or relevancy or ragas"
